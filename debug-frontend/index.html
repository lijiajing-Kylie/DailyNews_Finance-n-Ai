<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 新闻调试面板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; padding: 16px 20px; }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
  .section { background: #fff; border: 1px solid #e5e5e5; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #333; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  button { padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; font-family: inherit; }
  button:hover { background: #f0f0f0; }
  button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .search-row { display: flex; gap: 8px; margin-top: 8px; }
  input { padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: inherit; flex: 1; }
  .error-box { background: #fff0f0; border: 1px solid #fcc; border-radius: 4px; padding: 12px; margin-bottom: 12px; font-size: 13px; }
  .error-title { color: #c00; font-weight: 600; margin-bottom: 6px; }
  .loading { color: #888; font-style: italic; font-size: 13px; margin-bottom: 8px; }
  .card { border: 1px solid #eee; border-radius: 4px; padding: 12px; margin-bottom: 8px; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .score-badge { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 13px; font-weight: 700; margin-right: 8px; }
  .score-high { background: #d4edda; } .score-mid { background: #fff3cd; } .score-low { background: #f8d7da; }
  .field { font-size: 13px; margin-bottom: 4px; line-height: 1.5; }
  .label { color: #888; }
  .tag { display: inline-block; background: #e8f0fe; color: #1a56db; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin-right: 4px; margin-bottom: 2px; }
  .tag-topic { background: #f0e6f6; color: #7c3aed; }
  a { color: #2563eb; font-size: 12px; word-break: break-all; }
  pre { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 4px; font-size: 12px; overflow: auto; max-height: 400px; white-space: pre-wrap; word-break: break-all; font-family: 'SF Mono', 'Fira Code', monospace; }
  .meta { font-size: 12px; color: #999; margin-bottom: 8px; }
  .toggle-row { margin-bottom: 12px; }
  summary { cursor: pointer; font-size: 13px; color: #555; }
</style>
</head>
<body>
<div class="container">

<!-- ====================================================================== -->
<!-- HEADER                                                                  -->
<!-- ====================================================================== -->
<h1>AI 新闻调试面板</h1>
<p class="subtitle">
  后端地址：<code id="apiBaseLabel">http://localhost:8000</code>
  <span style="margin-left:12px" id="lastCallInfo"></span>
</p>

<!-- ====================================================================== -->
<!-- CONFIG                                                                  -->
<!-- ====================================================================== -->
<details class="section" style="padding:10px 16px;">
  <summary style="font-weight:600;">配置</summary>
  <div style="margin-top:8px;font-size:13px;">
    <label>API 地址：<input id="apiBaseInput" value="http://localhost:8000" style="width:320px;"></label>
    <button onclick="updateBaseUrl()" style="margin-left:8px;">应用</button>
    <span style="color:#888;margin-left:8px;font-size:12px;">如果后端在其他地址或端口，请在此修改</span>
  </div>
</details>

<!-- ====================================================================== -->
<!-- API TEST BUTTONS                                                        -->
<!-- ====================================================================== -->
<div class="section">
  <div class="section-title">接口测试</div>
  <div class="btn-row">
    <button onclick="apiCall('/api/health')">健康检查</button>
    <button onclick="apiCall('/api/items?per_page=20')">新闻列表</button>
    <button onclick="apiCall('/api/items?per_page=20&sort=published_at')">按日期排序</button>
    <button onclick="apiCall('/api/items?per_page=20&sort=ai_score')">按分数排序</button>
    <button onclick="apiCall('/api/items?min_score=8&per_page=20')">高分新闻（≥8）</button>
    <button onclick="apiCall('/api/runs')">运行记录</button>
    <button onclick="apiCall('/api/runs/dates')">数据日期</button>
    <button onclick="apiCall('/api/topics')">话题列表</button>
    <button onclick="apiCall('/api/categories')">分类统计</button>
    <button onclick="apiCall('/api/tags')">标签统计</button>
    <button onclick="apiCall('/api/stats')">数据统计</button>
  </div>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="搜索关键词或输入新闻 ID...">
    <button onclick="doSearch()">搜索</button>
    <button onclick="doGetById()">按 ID 查询</button>
  </div>
</div>

<!-- ====================================================================== -->
<!-- STATUS / LOADING / ERROR                                                -->
<!-- ====================================================================== -->
<div id="loadingBox" class="loading" style="display:none;">加载中...</div>
<div id="errorBox" class="error-box" style="display:none;"></div>

<!-- ====================================================================== -->
<!-- VIEW TOGGLE                                                             -->
<!-- ====================================================================== -->
<div id="viewToggle" class="toggle-row" style="display:none;">
  <button id="btnCardView" class="active" onclick="switchView('card')">卡片视图</button>
  <button id="btnJsonView" onclick="switchView('json')">原始 JSON</button>
</div>

<!-- ====================================================================== -->
<!-- NEWS LIST (Card View)                                                   -->
<!-- ====================================================================== -->
<div id="cardSection" class="section" style="display:none;">
  <div class="section-title" id="cardSectionTitle">新闻列表</div>
  <div id="cardList"></div>
</div>

<!-- ====================================================================== -->
<!-- RAW JSON                                                                -->
<!-- ====================================================================== -->
<div id="jsonSection" class="section" style="display:none;">
  <div class="section-title" id="jsonSectionTitle">接口原始返回 JSON</div>
  <pre id="jsonContent"></pre>
</div>

</div><!-- /container -->

<script>
// ===========================================================================
// Config
// ===========================================================================
let API_BASE_URL = localStorage.getItem('horizon_api_base_url') || 'http://localhost:8000';
document.getElementById('apiBaseInput').value = API_BASE_URL;
document.getElementById('apiBaseLabel').textContent = API_BASE_URL;

function updateBaseUrl() {
  API_BASE_URL = document.getElementById('apiBaseInput').value.replace(/\/$/, '');
  localStorage.setItem('horizon_api_base_url', API_BASE_URL);
  document.getElementById('apiBaseLabel').textContent = API_BASE_URL;
}

let lastResult = null;
let currentItems = [];
let isNewsList = false;  // true if response contained a recognized item list
let viewMode = 'card';  // 'card' | 'json'

// ===========================================================================
// API Client
// ===========================================================================
async function apiCall(path) {
  const url = `${API_BASE_URL}${path}`;
  const started = performance.now();
  const loadingEl = document.getElementById('loadingBox');
  const errorEl = document.getElementById('errorBox');
  loadingEl.style.display = 'block';
  errorEl.style.display = 'none';

  let res;
  try {
    res = await fetch(url);
  } catch (err) {
    loadingEl.style.display = 'none';
    lastResult = {
      url, ok: false, status: null, statusText: err.message,
      body: null, durationMs: Math.round(performance.now() - started),
    };
    showError(lastResult);
    updateLastCall();
    return;
  }

  let body;
  const text = await res.text();
  try { body = JSON.parse(text); } catch { body = text; }

  loadingEl.style.display = 'none';
  lastResult = {
    url, ok: res.ok, status: res.status, statusText: res.statusText,
    body, durationMs: Math.round(performance.now() - started),
  };

  if (!res.ok) {
    showError(lastResult);
    currentItems = [];
  } else {
    errorEl.style.display = 'none';
    // Auto-extract items (try multiple common response shapes)
    const b = lastResult.body;
    let extracted = null;
    if (Array.isArray(b)) {
      extracted = b;
    } else if (b && typeof b === 'object') {
      // Wrapped collections
      if (Array.isArray(b.items)) extracted = b.items;
      else if (Array.isArray(b.results)) extracted = b.results;
      else if (Array.isArray(b.news)) extracted = b.news;
      // Nested data.* collections
      else if (b.data) {
        if (Array.isArray(b.data)) extracted = b.data;
        else if (Array.isArray(b.data.items)) extracted = b.data.items;
        else if (Array.isArray(b.data.news)) extracted = b.data.news;
      }
      // Single item response (e.g. GET /api/items/{id} returns bare object)
      if (!extracted && (b.id && b.title)) {
        extracted = [b];
      }
    }
    currentItems = extracted || [];
    isNewsList = extracted != null;
  }

  render();
  updateLastCall();
}

// ===========================================================================
// Error display
// ===========================================================================
function showError(r) {
  const el = document.getElementById('errorBox');
  el.style.display = 'block';
  let bodyStr = '';
  if (r.body != null) {
    bodyStr = typeof r.body === 'string' ? r.body : JSON.stringify(r.body, null, 2);
  }
  el.innerHTML = `
    <div class="error-title">请求失败</div>
    <div><b>请求地址：</b>${escapeHtml(r.url)}</div>
    <div><b>HTTP 状态码：</b>${r.status ?? '网络错误'}</div>
    <div><b>错误信息：</b>${escapeHtml(r.statusText || '')}</div>
    ${bodyStr ? `<div style="margin-top:8px;"><b>后端返回内容：</b><pre style="margin-top:4px;max-height:200px;">${escapeHtml(bodyStr)}</pre></div>` : ''}
  `;
}

function updateLastCall() {
  const el = document.getElementById('lastCallInfo');
  if (!lastResult) { el.textContent = ''; return; }
  const color = lastResult.ok ? '#16a34a' : '#c00';
  el.innerHTML = `最近请求：<span style="color:${color}">${lastResult.status || 'ERR'}</span> · ${lastResult.durationMs}ms · <code>${escapeHtml(lastResult.url)}</code>`;
}

// ===========================================================================
// Rendering
// ===========================================================================
function switchView(mode) {
  viewMode = mode;
  document.getElementById('btnCardView').className = mode === 'card' ? 'active' : '';
  document.getElementById('btnJsonView').className = mode === 'json' ? 'active' : '';
  render();
}

function render() {
  const toggleEl = document.getElementById('viewToggle');
  const cardSection = document.getElementById('cardSection');
  const jsonSection = document.getElementById('jsonSection');

  if (!lastResult) {
    toggleEl.style.display = 'none';
    cardSection.style.display = 'none';
    jsonSection.style.display = 'none';
    return;
  }

  toggleEl.style.display = 'block';

  // Card view
  if (viewMode === 'card') {
    cardSection.style.display = 'block';
    jsonSection.style.display = 'block';  // always show raw JSON at bottom too
    renderCards();
  } else {
    cardSection.style.display = 'none';
    jsonSection.style.display = 'block';
  }

  // Raw JSON always in json section
  renderJson();
}

function renderCards() {
  const titleEl = document.getElementById('cardSectionTitle');
  const listEl = document.getElementById('cardList');

  const total = lastResult.body?.total;
  titleEl.innerHTML = `新闻列表 <span class="meta">（${currentItems.length} 条${total != null ? ' / 共 ' + total + ' 条' : ''}）</span>`;

  // Non-news-list endpoints (e.g. /api/health, /api/stats, /api/topics)
  if (!isNewsList && currentItems.length === 0) {
    listEl.innerHTML = '<div style="color:#888;font-size:13px;padding:12px;">当前接口不返回新闻列表，请查看下方的 <b>原始 JSON</b> 获取完整返回内容。</div>';
    return;
  }

  if (currentItems.length === 0) {
    listEl.innerHTML = '<div style="color:#888;font-size:13px;padding:12px;">没有数据。请尝试其他查询条件，或检查数据库中是否有数据。</div>';
    return;
  }

  listEl.innerHTML = currentItems.map(function(item) {
    var meta = item.metadata || {};

    // 分数：ai_score → score → hot_score
    var score = field(item, 'ai_score', 'score', 'hot_score');
    var scoreClass = score >= 8 ? 'score-high' : score >= 5 ? 'score-mid' : 'score-low';
    var scoreBadge = score != null
      ? '<span class="score-badge ' + scoreClass + '">' + score + '</span>'
      : '';

    // Title
    var title = meta.title_zh || field(item, 'title') || '-';

    // 来源： source_type → source
    var source = displayName(field(item, 'source_type', 'source')) || '-';

    // 发布时间： published_at → publish_time → created_at → date
    var published = field(item, 'published_at', 'publish_time', 'created_at', 'date') || '-';

    // 摘要：ai_summary → detailed_summary_zh → summary → content（截断）
    var summary = meta.detailed_summary_zh || field(item, 'ai_summary', 'summary');
    var summaryHtml = '';
    if (summary) {
      summaryHtml = '<div class="field"><span class="label">摘要：</span> ' + escapeHtml(summary) + '</div>';
    } else if (item.content) {
      var short = String(item.content).slice(0, 200);
      summaryHtml = '<div class="field"><span class="label">摘要：</span> <span style="color:#888;">（来自正文） ' + escapeHtml(short) + (item.content.length > 200 ? '...' : '') + '</span></div>';
    } else {
      summaryHtml = '<div class="field"><span class="label">摘要：</span> -</div>';
    }

    // 推荐原因：ai_reason → reason
    var reason = meta.reason_zh || field(item, 'ai_reason', 'reason');
    var reasonHtml = reason
      ? '<div class="field"><span class="label">推荐原因：</span> <span style="color:#555;font-style:italic;">' + escapeHtml(reason) + '</span></div>'
      : '<div class="field"><span class="label">推荐原因：</span> -</div>';

    // 分类： metadata.category → category
    var cat = displayName(item.metadata?.category || field(item, 'category'));
    var categoryHtml = cat
      ? '<div class="field"><span class="label">分类：</span> ' + escapeHtml(cat) + '</div>'
      : '';

    // 标签： ai_tags → tags (handles both string[] and object[])
    var tagsArr = field(item, 'ai_tags', 'tags');
    var tagsHtml = '';
    if (Array.isArray(tagsArr) && tagsArr.length > 0) {
      tagsHtml = '<div class="field"><span class="label">标签：</span>' + tagsArr.map(function(t) {
        var label = typeof t === 'string' ? t : (t.name || t.tag || t.slug || JSON.stringify(t));
        return '<span class="tag">' + escapeHtml(label) + '</span>';
      }).join('') + '</div>';
    }

    // 话题： topics → topic_tags (handles string[] and object[])
    var topicsArr = normalizeTopics(field(item, 'topics', 'topic_tags'));
    var topicsHtml = '';
    if (topicsArr.length > 0) {
      topicsHtml = '<div class="field"><span class="label">话题：</span>' + topicsArr.map(function(t) {
        var label = escapeHtml(t.name || t.slug || '-');
        if (t.confidence != null) label += ' (' + t.confidence + ')';
        return '<span class="tag tag-topic">' + label + '</span>';
      }).join('') + '</div>';
    }

    // URL
    var url = field(item, 'url') || '';

    // ID
    var id = field(item, 'id') || '-';

    return '<div class="card">'
      + '<div class="card-title">' + scoreBadge + escapeHtml(title) + '</div>'
      + '<div class="field">'
      + '<span class="label">来源：</span> ' + escapeHtml(source)
	      + ' <span class="label">分类：</span> ' + escapeHtml(cat)
	      + '<span style="margin:0 12px;color:#ddd;">|</span>'
	      + '<span class="label">发布时间：</span> ' + escapeHtml(published)
      + '<span style="margin:0 12px;color:#ddd;">|</span>'
      + '<span class="label">ID：</span> <span style="font-size:11px;">' + escapeHtml(id) + '</span>'
      + '</div>'
      + summaryHtml
      + reasonHtml
      + tagsHtml
      + topicsHtml
      + (url ? '<div class="field"><a href="' + escapeHtml(url) + '" target="_blank" rel="noreferrer">' + escapeHtml(url) + '</a></div>' : '')
      + '</div>';
  }).join('');
}

function renderJson() {
  const titleEl = document.getElementById('jsonSectionTitle');
  const contentEl = document.getElementById('jsonContent');
  titleEl.innerHTML = `接口原始返回 JSON <span class="meta">(${lastResult.url} · ${lastResult.status} · ${lastResult.durationMs}ms)</span>`;
  contentEl.textContent = JSON.stringify(lastResult.body, null, 2);
}

// ===========================================================================
// Search / Get by ID helpers
// ===========================================================================
function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  apiCall('/api/search?q=' + encodeURIComponent(q));
}

function doGetById() {
  const id = document.getElementById('searchInput').value.trim();
  if (!id) return;
  apiCall('/api/items/' + encodeURIComponent(id));
}

// Enter key in search input
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// ===========================================================================
// Util
// ===========================================================================
// Source / category → Chinese display name mapping
var NAME_MAP = {
  // Sources
  'rss': 'RSS',
  'github': 'GitHub',
  'hackernews': 'Hacker News',
  'reddit': 'Reddit',
  'telegram': 'Telegram',
  'twitter': 'X/Twitter',
  'openbb': 'OpenBB 金融',
  'ossinsight': 'OSS Insight',
  'gdelt': 'GDELT',
  'google_news': 'Google News',
  // Categories
  'ai-aggregator': 'AI 聚合站',
  'foreign-media': '外媒',
  'chinese-media': '中文媒体',
  'tech-media': '科技媒体',
  'academic': '学术论文',
  'social-media': '社交媒体',
  'github-trending': 'GitHub 热门',
  'financial': '财经',
  'unknown': '其他',
};

function displayName(key) {
  if (!key) return '-';
  return NAME_MAP[key] || key;
}
// Safe field accessor: try multiple field names, return first non-null match
function field(item, ...names) {
  for (const name of names) {
    const val = item[name];
    if (val !== undefined && val !== null) return val;
  }
  return null;
}

// Normalize topics: accept both object arrays [{name,slug}] and string arrays ["topic1"]
function normalizeTopics(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(function(t) {
    if (typeof t === 'string') return { name: t, slug: t };
    return t;
  });
}

function escapeHtml(str) {
  if (str == null) return '';
  const s = String(str);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===========================================================================
// Auto-run health check on page load
// ===========================================================================
apiCall('/api/health');
</script>

</body>
</html>
